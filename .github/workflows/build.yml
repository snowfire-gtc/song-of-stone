name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libgl1-mesa-dev

    - name: Build game
      run: make build
    
    - name: Verify build
      run: make test
    
    - name: Build network server
      run: make server
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: song-of-stone
        path: |
          build/song-of-stone
          ctf_server
